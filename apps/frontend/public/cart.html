<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина | Adzek</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background:#f7f9fb; color:#191c1e; }
    h1,h2,h3 { font-family:'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .top-nav { transition: background-color .25s ease, box-shadow .25s ease, height .25s ease; }
    .top-nav.is-scrolled { background-color: rgba(255,255,255,.92); box-shadow: 0 12px 30px rgba(0,88,188,.12); height: 4.25rem; }
  </style>
</head>
<body>
  <nav id="topNav" class="top-nav fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_20px_40px_rgba(0,88,188,0.06)] h-20">
    <div class="flex justify-between items-center px-8 h-full max-w-7xl mx-auto">
      <a class="text-2xl font-black text-blue-700 tracking-tighter" href="index.html">Adzek</a>
      <div class="hidden md:flex gap-8 items-center">
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="catalog.html">Каталог</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#eco">Эко-линейка</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#about">О бренде</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#delivery">Доставка</a>
      </div>
      <div class="flex items-center gap-4">
        <a class="inline-flex items-center justify-center text-blue-700 hover:scale-110 transition-transform" href="cart.html" aria-label="Корзина"><span class="material-symbols-outlined">shopping_cart</span></a>
        <a class="inline-flex items-center justify-center text-blue-700 hover:scale-110 transition-transform" href="account.html" aria-label="Личный кабинет"><span class="material-symbols-outlined">person</span></a>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-16 px-4 md:px-8 max-w-7xl mx-auto">
    <h1 class="text-4xl font-extrabold tracking-tight mb-8">Корзина</h1>
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <section id="cartItems" data-cart-items class="lg:col-span-8 space-y-6"></section>
      <aside id="cartSummary" data-cart-summary class="lg:col-span-4 sticky top-28 bg-white rounded-2xl p-6 shadow-[0_20px_40px_rgba(0,88,188,0.06)]"></aside>
    </div>
  </main>

  <footer class="w-full px-10 py-12 bg-slate-100 mt-8">
    <div class="max-w-7xl mx-auto flex items-center justify-between text-sm text-slate-500">
      <span>© 2026 Adzek</span>
      <div class="flex gap-5">
        <a href="privacy.html" class="hover:text-blue-700">Политика</a>
        <a href="terms.html" class="hover:text-blue-700">Условия</a>
      </div>
    </div>
  </footer>

  <script  src="/assets/js/app.js"></script>
</body>
</html>
