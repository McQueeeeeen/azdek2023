<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-tertiary-fixed": "#0f1d25",
                    "tertiary": "#505e67",
                    "surface-container-highest": "#e0e3e5",
                    "outline": "#717786",
                    "on-error-container": "#93000a",
                    "surface": "#f7f9fb",
                    "surface-dim": "#d8dadc",
                    "surface-bright": "#f7f9fb",
                    "tertiary-fixed-dim": "#bac9d3",
                    "secondary-fixed-dim": "#78dc77",
                    "primary-fixed-dim": "#adc6ff",
                    "on-tertiary-fixed-variant": "#3b4951",
                    "inverse-primary": "#adc6ff",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "background": "#f7f9fb",
                    "on-background": "#191c1e",
                    "secondary-fixed": "#94f990",
                    "on-tertiary-container": "#fbfcff",
                    "on-primary-fixed-variant": "#004493",
                    "primary": "#0058bc",
                    "inverse-surface": "#2d3133",
                    "on-surface": "#191c1e",
                    "on-primary-container": "#fefcff",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#00731e",
                    "surface-tint": "#005bc1",
                    "surface-container-high": "#e6e8ea",
                    "secondary": "#006e1c",
                    "primary-container": "#0070eb",
                    "tertiary-container": "#687780",
                    "outline-variant": "#c1c6d7",
                    "on-primary-fixed": "#001a41",
                    "primary-fixed": "#d8e2ff",
                    "on-surface-variant": "#414755",
                    "surface-container-low": "#f2f4f6",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#005313",
                    "on-secondary-fixed": "#002204",
                    "inverse-on-surface": "#eff1f3",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]

          },
        },
      }

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
body {
    font-family: "Inter", sans-serif;
    background-color: #f7f9fb
    }
.headline-font {
    font-family: "Manrope", sans-serif
    }
.botanical-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDNYgs6NALb9XFYmUYaTQvGBfGMQ1D-iP6Vins-GITwnBWqrEUscxB4M9pQzXv725z3XnRDLczy8sV05WPUR8Y4ign35ejtaofdKsSA7QhPtDA8LJn3NC-A5qfulQcg2-w9_iFPmpIATdPpXrcXMIc4nimL1gYFNcdnQr6bFxxPudGmrCMk6jLdSh39K9Okb_JQjMCm9fwOFaaAeUKW-IHd-8oVg4GuC44RqZQ9TWCXi1qyHmaO9YI7tKYPQj9zotOtJdTPEf3sFkXV);
    background-size: cover;
    background-position: center
    }
.glass-effect {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px)
    }</style>
</head>
<body class="bg-surface text-on-surface antialiased selection:bg-secondary-container selection:text-on-secondary-container">
<main class="min-h-screen flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-md flex flex-col items-center">
<div class="mb-12 flex flex-col items-center">
<div class="w-24 h-24 mb-8 bg-secondary-container/20 rounded-full flex items-center justify-center">
<img alt="" class="w-16 h-16 object-contain opacity-80" data-alt="Minimalist botanical illustration of a eucalyptus branch with soft green leaves on a pure white background, editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWiWXAvOf7n4dD27C9J20fOt09cpJJ4J41Hs_ifNB5KOam2uzXu5Vb4sIlMN5fbJ4WcihSkPhTdYEIg4cj0kZ3XP5m5DXIO1BA-noUi0DwkAPwH1j5FKUqu8_O-GMK0LdueZM2Z44YoO6Vy-sNyIEP32kTxjuWSz_G9gTXM9wpyWCbK1YHfaD74UWOvCaKx2Mj9sXHH3ZZhG38uoWp5i2Dcpr8Y9TdiwIf-Eu4HS1j-fLFXinzJ47xGqh5MykJNtItzukWiDlj20wk"/>
</div>
<h1 class="headline-font text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Присоединяйтесь к PureLab</h1>
<p class="text-on-surface-variant font-body text-sm tracking-wide text-center max-w-[280px]">Чистота и забота в каждом прикосновении к вашему дому.</p>
</div>
<div class="w-full bg-surface-container-lowest p-10 rounded-xl shadow-[0px_20px_40px_rgba(0,88,188,0.04)] border border-outline-variant/10">
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="name">Ваше имя</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40" id="name" name="name" placeholder="Александр Петров" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Почта</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40" id="email" name="email" placeholder="hello@purelab.ru" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Пароль</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold rounded-lg shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all headline-font tracking-tight mt-4" type="submit">
                        Создать профиль
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/15 flex flex-col items-center gap-4">
<p class="text-xs text-on-surface-variant">Уже есть аккаунт? <a class="text-primary font-semibold hover:underline" href="#">Войти</a></p>
</div>
</div>
<div class="mt-12 flex items-center gap-8 opacity-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">eco</span>
<span class="text-[10px] font-bold uppercase tracking-widest">100% Organic</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">science</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Lab Tested</span>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 w-full py-8 pointer-events-none">
<div class="max-w-7xl mx-auto px-8 flex justify-between items-center opacity-30 text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">
<span>PureLab Laboratory © 2024</span>
<span>Minimalist Linen &amp; Lather Series</span>
</div>
</footer>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-container/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
