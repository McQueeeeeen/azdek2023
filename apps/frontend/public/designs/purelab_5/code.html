<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Регистрация | PureLab</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-container-high": "#e6e8ea",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary-container": "#687780",
                        "surface-bright": "#f7f9fb",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary-fixed": "#0f1d25",
                        "on-secondary-fixed-variant": "#005313",
                        "on-surface": "#191c1e",
                        "surface-tint": "#005bc1",
                        "outline-variant": "#c1c6d7",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d8e2ff",
                        "primary": "#0058bc",
                        "surface-dim": "#d8dadc",
                        "on-primary-fixed": "#001a41",
                        "background": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#414755",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "secondary": "#006e1c",
                        "primary-container": "#0070eb",
                        "secondary-container": "#91f78e",
                        "on-tertiary-fixed-variant": "#3b4951",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary-fixed": "#d6e5ef",
                        "on-primary-container": "#fefcff",
                        "on-secondary-fixed": "#002204",
                        "tertiary-fixed-dim": "#bac9d3",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#00731e",
                        "surface": "#f7f9fb",
                        "secondary-fixed-dim": "#78dc77",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "outline": "#717786",
                        "on-tertiary": "#ffffff",
                        "on-background": "#191c1e",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e5",
                        "inverse-primary": "#adc6ff",

                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #0058bc 0%, #0070eb 100%);
        }
        body {
            background-color: #f7f9fb;
        }
    </style>
</head>
<body class="font-body text-on-surface">
<div class="relative min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
<!-- Background Elements for Atmospheric Depth -->
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-secondary-container rounded-full opacity-20 blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-primary-fixed rounded-full opacity-15 blur-3xl"></div>
<!-- Back Button - Focused View Logic -->
<div class="absolute top-8 left-8">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-medium">Вернуться</span>
</a>
</div>
<!-- Main Registration Card -->
<main class="relative z-10 w-full max-w-[520px]">
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0px_20px_40px_rgba(0,88,188,0.06)]">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-10">
<div class="size-12 mb-6 flex items-center justify-center text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="font-headline text-3xl font-black tracking-[-0.033em] mb-2">Создать аккаунт</h1>
<p class="text-on-surface-variant text-center leading-relaxed">
                        Присоединяйтесь к PureLab и начните свой путь <br class="hidden sm:block"/> к осознанному потреблению
                    </p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Field: Name -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Как вас зовут?</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="Введите ваше имя" type="text"/>
</div>
</div>
<!-- Field: Email -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Email адрес</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Field: Password -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Пароль</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-4 pr-12 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Подтверждение</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Policy Checkbox -->
<div class="flex items-start gap-3 py-2">
<div class="pt-1">
<input class="size-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low" id="policy" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-relaxed" for="policy">
                            Я соглашаюсь с <a class="text-primary font-medium hover:underline underline-offset-4" href="#">Политикой конфиденциальности</a> и правилами обработки персональных данных.
                        </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="btn-gradient w-full h-14 rounded-lg text-on-primary font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
                            Зарегистрироваться
                        </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-8 border-t border-surface-container-high text-center">
<p class="text-on-surface-variant">
                        Уже есть аккаунт? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="#">Войти в систему</a>
</p>
</div>
</div>
<!-- Bottom Eco Badge -->
<div class="mt-8 flex justify-center items-center gap-6 opacity-60">
<div class="flex items-center gap-2 text-xs font-medium uppercase tracking-wider text-on-surface-variant">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="eco">eco</span>
                    100% Биоразлагаемо
                </div>
<div class="flex items-center gap-2 text-xs font-medium uppercase tracking-wider text-on-surface-variant">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="verified_user">verified_user</span>
                    Безопасно для детей
                </div>
</div>
</main>
<!-- Decorative Product Element -->
<div class="hidden lg:block absolute bottom-12 right-12 max-w-[200px]">
<div class="relative group">
<div class="absolute inset-0 bg-secondary-container rounded-xl rotate-6 transition-transform group-hover:rotate-12 duration-500"></div>
<img alt="Eco-friendly product" class="relative rounded-xl shadow-xl transition-transform group-hover:scale-105 duration-500" data-alt="Minimalist white bottle of household detergent with a wooden cap on a soft mint green background with natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2FyeNKiNfjyp0nCTPJjMFBiELSf8GB0RqY4SoAHL1lksQ1u_KQUlbGGLsIM-YxYZL2368wwMTuM2lwbb7FxD1dXddAOsIwTbitgri06QAZkZUxHbKCt7qinuzUbZIINfrc_p8SRSBG0ayfQolyLzgaNNYeo2QIwdJvkCeeQxZTvYagCWmwKTHvIAZ4WtnBwFMLJNlnqymJZepCI1Vgxgwpqj35ae9RnCA0MOQ4oQfx2iilu3bbVDTvPhjCnLYEZ39bzUu4UmYjFkJ"/>
</div>
</div>
</div>
</body></html>
