<!DOCTYPE html>

<html class="light" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PureLab - Создать аккаунт</title>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }
.bg-blur-ambient {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAIyEjhijQmqMDVuuAjcGk4jdoMkkkgiNvccPNpQ5BlV9reu7AdSWFKA2cq6tJL1p3zTmNJhiKBOzT6CRHEqm4_2lITcIFODgWJ4DZdS7kXFJMC0CrVLVqGrugEbY47fQAxiSYrrxBR1Jc59fL-oZ4aTxISC9YR5_OFxUv7O7FpNU0Rwn8_r-DalpQ1YqnB6M7nHJ1TQEDx0MCs-_sEskzRcBzrJq-WjEzwoR07sKGbL-6hx6qT77bMVm7Js8y8j3oFprbsxdX3trNs);
    background-size: cover;

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Hero Backdrop with Blurred Elements -->
<div class="fixed inset-0 z-0 bg-blur-ambient" data-alt="ultra-close up of ethereal iridescent soap bubbles floating in white space with soft morning light and pastel highlights"></div>
<div class="fixed inset-0 z-0 bg-surface/30 backdrop-blur-sm"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-lg">
<!-- Branding Header -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface mb-2">PureLab</h1>
<p class="font-body text-on-surface-variant tracking-wide">Чистота в её первозданном виде</p>
</div>
<!-- Registration Card -->
<div class="glass-card rounded-xxl p-8 md:p-12 shadow-[0px_20px_40px_rgba(0,88,188,0.06)] ring-1 ring-outline-variant/15">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-1">Создать аккаунт</h2>
<p class="text-on-surface-variant text-sm">Присоединяйтесь к сообществу осознанного ухода</p>
</div>
<form class="space-y-6">
<!-- Name Input -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="name">Имя</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-surface-tint/20 transition-all text-on-surface placeholder:text-outline-variant/60" id="name" name="name" placeholder="Александр Петров" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-surface-tint/20 transition-all text-on-surface placeholder:text-outline-variant/60" id="email" name="email" placeholder="hello@purelab.ru" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="password">Пароль</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-surface-tint/20 transition-all text-on-surface placeholder:text-outline-variant/60" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all mt-4" type="submit">
                        Зарегистрироваться
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant">
                        Уже есть аккаунт? 
                        <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Войти</a>
</p>
</div>
</div>
<!-- Trust Badges Section -->
<div class="mt-12 flex flex-wrap justify-center gap-8 md:gap-12">
<div class="flex items-center gap-3 bg-secondary-container/30 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-secondary text-xl" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-label text-xs font-bold text-on-secondary-container uppercase tracking-widest">100% Eco</span>
</div>
<div class="flex items-center gap-3 bg-surface-container-low px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">child_care</span>
<span class="font-label text-xs font-bold text-on-primary-fixed-variant uppercase tracking-widest">Safe for Kids</span>
</div>
</div>
</div>
</main>
<!-- Footer Segment -->
<footer class="relative z-10 w-full max-w-7xl mx-auto py-8 px-8">
<div class="flex flex-col md:flex-row justify-between items-center gap-6">
<p class="font-body text-xs text-on-surface-variant tracking-wide">© 2024 Pristine Laboratory. All rights reserved.</p>
<div class="flex gap-8">
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Политика конфиденциальности</a>
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Условия использования</a>
</div>
</div>
</footer>
</body></html>
