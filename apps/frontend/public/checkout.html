<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оформление заказа | Adzek</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background:#f7f9fb; color:#191c1e; }
    h1,h2,h3 { font-family:'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .top-nav { transition: background-color .25s ease, box-shadow .25s ease, height .25s ease; }
    .top-nav.is-scrolled { background-color: rgba(255,255,255,.92); box-shadow: 0 12px 30px rgba(0,88,188,.12); height: 4.25rem; }
  </style>
</head>
<body>
  <nav id="topNav" class="top-nav fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_20px_40px_rgba(0,88,188,0.06)] h-20">
    <div class="flex justify-between items-center px-8 h-full max-w-7xl mx-auto">
      <a class="text-2xl font-black text-blue-700 tracking-tighter" href="index.html">Adzek</a>
      <div class="hidden md:flex gap-8 items-center">
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="catalog.html">Каталог</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#eco">Эко-линейка</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#about">О бренде</a>
        <a class="font-semibold text-slate-600 hover:text-blue-700" href="index.html#delivery">Доставка</a>
      </div>
      <div class="flex items-center gap-4">
        <a class="inline-flex items-center justify-center text-blue-700 hover:scale-110 transition-transform" href="cart.html" aria-label="Корзина"><span class="material-symbols-outlined">shopping_cart</span></a>
        <a class="inline-flex items-center justify-center text-blue-700 hover:scale-110 transition-transform" href="account.html" aria-label="Личный кабинет"><span class="material-symbols-outlined">person</span></a>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-16 px-4 md:px-8 max-w-7xl mx-auto">
    <h1 class="text-4xl font-extrabold tracking-tight mb-2">Оформление заказа</h1>
    <p class="text-slate-500 mb-8">Заполните данные для доставки и подтверждения заказа</p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <section class="lg:col-span-8 space-y-6">
        <div class="bg-white rounded-2xl p-6 shadow-[0_20px_40px_rgba(0,88,188,0.06)] space-y-4">
          <h2 class="text-xl font-bold">Контактные данные</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input name="firstName" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200" placeholder="Имя" />
            <input name="lastName" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200" placeholder="Фамилия" />
            <input name="email" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 md:col-span-2" placeholder="Email" type="email" />
            <input name="phone" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 md:col-span-2" placeholder="Телефон" />
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-[0_20px_40px_rgba(0,88,188,0.06)] space-y-4">
          <h2 class="text-xl font-bold">Доставка</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input name="city" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200" placeholder="Город" />
            <select name="deliveryMethod" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200">
              <option value="city">Курьер по городу</option>
              <option value="pickup">Самовывоз</option>
            </select>
            <select name="paymentMethod" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 md:col-span-2">
              <option value="card_online">Карта онлайн</option>
              <option value="cash">Наличными при получении</option>
            </select>
            <textarea name="address" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 md:col-span-2" rows="3" placeholder="Улица, дом, квартира"></textarea>
            <textarea name="comment" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 md:col-span-2" rows="2" placeholder="Комментарий к заказу"></textarea>
          </div>
        </div>
      </section>

      <aside class="lg:col-span-4 sticky top-28 bg-white rounded-2xl p-6 shadow-[0_20px_40px_rgba(0,88,188,0.06)]">
        <h2 class="text-2xl font-bold mb-4">Подтверждение</h2>
        <p class="text-slate-500 mb-6">Сумма и позиции берутся из вашей корзины.</p>
        <button id="checkoutSubmit" data-checkout-submit class="w-full py-4 bg-blue-700 hover:bg-blue-600 text-white rounded-xl font-bold transition-colors">
          Подтвердить заказ
        </button>
      </aside>
    </div>
  </main>

  <script  src="/assets/js/app.js"></script>
</body>
</html>
