</div>
<form class="space-y-6">
<!-- Input: Email -->
<div class="space-y-2">
<label class="block text-xs font-label font-bold text-outline ml-4 uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="email" placeholder="name@clinical.com" type="email"/>
</div>
<!-- Input: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-4">
<label class="block text-xs font-label font-bold text-outline uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-label font-bold text-tertiary underline decoration-2 underline-offset-4 hover:text-tertiary-container transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 rounded-xl bg-gradient-to-tr from-primary to-primary-container text-white font-label font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 mt-4" type="submit">
                        Log In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10 text-center">
<span class="relative z-10 px-4 bg-transparent text-xs font-label font-bold text-outline-variant uppercase tracking-[0.2em]">or access via</span>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant opacity-20"></div>
</div>
<!-- Social Logins -->

<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-lowest rounded-xl border border-outline-variant/10 hover:bg-surface-container-low transition-all duration-300 group">

</button>

<span class="text-sm font-label font-bold text-on-surface-variant group-hover:text-on-surface">Apple</span>
