<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#3e494b",
                    "on-primary": "#ffffff",
                    "tertiary": "#8c4b11",
                    "primary-fixed": "#9fefff",
                    "surface-container-high": "#e1e9ee",
                    "on-background": "#151d20",
                    "outline-variant": "#bdc9cb",
                    "surface-container-highest": "#dce4e8",
                    "secondary": "#41646b",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#2a3235",
                    "surface-container-low": "#edf5f9",
                    "secondary-fixed-dim": "#a8cdd5",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "surface-dim": "#d3dbe0",
                    "surface-tint": "#006876",
                    "surface-container": "#e7eff3",
                    "inverse-on-surface": "#eaf2f6",
                    "on-primary-container": "#f8feff",
                    "tertiary-fixed-dim": "#ffb782",
                    "on-secondary-fixed-variant": "#284c53",
                    "on-secondary-container": "#45686f",
                    "surface": "#f3fbff",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f3fbff",
                    "surface-bright": "#f3fbff",
                    "error-container": "#ffdad6",

                    "on-tertiary-container": "#fffbff",

                    "on-surface": "#151d20",
                    "inverse-primary": "#6ed5e8",

                    "tertiary-fixed": "#ffdcc5",
                    "tertiary-container": "#aa6329",
                    "secondary-fixed": "#c4e9f1",
                    "primary-fixed-dim": "#6ed5e8"

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 10px 40px rgba(21, 29, 32, 0.04);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Background Content (Simulating Catalog Screen) -->
<div class="fixed inset-0 z-0 flex flex-col pointer-events-none opacity-40 blur-sm">
<header class="flex justify-between items-center px-8 py-4 w-full bg-[#f3fbff]/80 backdrop-blur-md">
<div class="font-serif italic text-2xl text-[#006673]">Clinical Editorial</div>
<div class="flex gap-8 font-label text-xs uppercase tracking-widest text-[#151d20]/60">
<span>Shop</span>
<span>Philosophy</span>
<span>Lab Notes</span>
</div>
<span class="material-symbols-outlined text-[#006673]">shopping_bag</span>
</header>
<main class="p-8 grid grid-cols-2 md:grid-cols-3 gap-12 mt-20">
<div class="space-y-4">
<div class="aspect-[3/4] bg-surface-container-low"></div>
<div class="h-4 w-1/2 bg-surface-container-high"></div>
</div>
<div class="space-y-4">
<div class="aspect-[3/4] bg-surface-container-low"></div>
<div class="h-4 w-2/3 bg-surface-container-high"></div>
</div>
<div class="space-y-4">
<div class="aspect-[3/4] bg-surface-container-low"></div>
<div class="h-4 w-1/3 bg-surface-container-high"></div>
</div>
</main>
</div>
<!-- Scrim Overlay -->
<div class="fixed inset-0 bg-[#151d20]/30 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="fixed inset-x-0 bottom-0 top-12 md:top-24 flex items-center justify-center z-50 px-4 pb-0 md:pb-8">
<div class="bg-surface w-full max-w-4xl h-full md:h-auto md:max-h-[870px] flex flex-col rounded-t-xl md:rounded-xl overflow-hidden editorial-shadow ring-1 ring-on-surface/5">
<!-- Modal Header -->
<div class="px-8 py-8 flex justify-between items-start">
<div class="space-y-1">
<h2 class="font-headline text-4xl md:text-5xl text-on-surface tracking-tight">Refine Your Ritual</h2>
<p class="font-body text-on-surface-variant/70 text-sm">Fine-tune the chemical parameters of your environment.</p>
</div>
<button class="p-2 hover:bg-surface-container-high transition-colors duration-300">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
</div>
<!-- Modal Scrollable Content -->
<div class="flex-1 overflow-y-auto px-8 pb-32 no-scrollbar">
<div class="grid grid-cols-1 md:grid-cols-12 gap-12">
<!-- Section 1: Category -->
<div class="md:col-span-4 space-y-6">
<h3 class="font-label text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant">Category</h3>
<div class="flex flex-col gap-5">
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent transition-all duration-300" type="checkbox"/>
<span class="ml-4 font-body text-on-surface group-hover:text-primary transition-colors">Laundry</span>
</label>
<label class="flex items-center group cursor-pointer">
<input checked="" class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="ml-4 font-body text-on-surface group-hover:text-primary transition-colors">Kitchen</span>
</label>
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="ml-4 font-body text-on-surface group-hover:text-primary transition-colors">Bathroom</span>
</label>
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="ml-4 font-body text-on-surface group-hover:text-primary transition-colors">Science</span>
</label>
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="ml-4 font-body text-on-surface group-hover:text-primary transition-colors">Archive</span>
</label>
</div>
</div>
<!-- Section 2: Scent Profile -->
<div class="md:col-span-8 space-y-6">
<div class="flex justify-between items-baseline">
<h3 class="font-label text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant">Scent Profile</h3>
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Multi-Select Active</span>
</div>
<div class="flex flex-wrap gap-3">
<!-- Selected Chip -->
<button class="px-5 py-2.5 bg-primary text-on-primary font-body text-sm rounded-sm transition-all duration-300 flex items-center gap-2">
                                Clinical Musk
                                <span class="material-symbols-outlined text-xs">check</span>
</button>
<button class="px-5 py-2.5 bg-surface-container-high hover:bg-surface-container-highest text-on-surface-variant font-body text-sm rounded-sm transition-all duration-300">
                                Ozone
                            </button>
<!-- Selected Chip -->
<button class="px-5 py-2.5 bg-primary text-on-primary font-body text-sm rounded-sm transition-all duration-300 flex items-center gap-2">
                                Eucalyptus 02
                                <span class="material-symbols-outlined text-xs">check</span>
</button>
<button class="px-5 py-2.5 bg-surface-container-high hover:bg-surface-container-highest text-on-surface-variant font-body text-sm rounded-sm transition-all duration-300">
                                Unscented
                            </button>
<button class="px-5 py-2.5 bg-surface-container-high hover:bg-surface-container-highest text-on-surface-variant font-body text-sm rounded-sm transition-all duration-300">
                                Bergamot
                            </button>
</div>
<div class="pt-8 space-y-6">
<!-- Section 3: Price Tier -->
<h3 class="font-label text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant">Price Tier</h3>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<label class="p-4 border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer rounded-sm group">
<div class="flex justify-between items-start mb-2">
<input class="w-3.5 h-3.5 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="text-[10px] font-label font-bold text-outline">01</span>
</div>
<div class="font-body text-sm font-semibold">Essentials</div>
<div class="font-body text-xs text-on-surface-variant/60">$15 - $25</div>
</label>
<label class="p-4 border border-primary/30 bg-surface-container-lowest transition-colors cursor-pointer rounded-sm group relative">
<div class="flex justify-between items-start mb-2">
<input checked="" class="w-3.5 h-3.5 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="text-[10px] font-label font-bold text-primary">02</span>
</div>
<div class="font-body text-sm font-semibold">Concentrates</div>
<div class="font-body text-xs text-on-surface-variant/60">$30 - $55</div>
</label>
<label class="p-4 border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer rounded-sm group">
<div class="flex justify-between items-start mb-2">
<input class="w-3.5 h-3.5 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="text-[10px] font-label font-bold text-outline">03</span>
</div>
<div class="font-body text-sm font-semibold">Archive Sets</div>
<div class="font-body text-xs text-on-surface-variant/60">$75+</div>
</label>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Action Bar (Fixed at bottom of modal) -->
<div class="px-8 py-6 bg-surface border-t border-outline-variant/10 flex justify-between items-center mt-auto">
<button class="font-headline italic text-on-surface-variant hover:text-primary transition-all duration-300 relative group">
                    Clear All
                    <span class="absolute bottom-0 left-0 w-0 h-px bg-primary/30 group-hover:w-full transition-all duration-500"></span>
</button>
<div class="flex items-center gap-6">
<span class="hidden md:block font-label text-[10px] uppercase tracking-widest text-outline">12 Products Found</span>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold text-xs uppercase tracking-[0.15em] px-8 py-4 rounded-sm editorial-shadow hover:brightness-110 active:scale-95 transition-all duration-200">
                        Apply Filters
                    </button>
</div>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 p-8 z-50 pointer-events-none">
<div class="flex flex-col items-end opacity-20">
<span class="font-label text-[8px] uppercase tracking-[0.4em] mb-2">Ref. Lab_Catalog_011</span>
<div class="w-32 h-px bg-on-surface"></div>
</div>
</div>
</body></html>
